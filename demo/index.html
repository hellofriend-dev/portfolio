<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0e0c" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1714" media="(prefers-color-scheme: dark)" />

    <title>Учёт инструмента</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700&display=swap" />
    <script>
      // Apply dark mode before render to avoid flash
      try {
        const t = localStorage.getItem('theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (t === 'dark' || (!t && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      } catch {}
    </script>

    <link rel="stylesheet" crossorigin href="/portfolio/demo/assets/index-DvTREy1K.css">
